name: Build and Deploy SRE Agent

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AGENT_NAME: sre-ai-my
  AZURE_SUBSCRIPTION_ID: 86b37969-9445-49cf-b03f-d8866235171c
  AZURE_RESOURCE_GROUP: ai-myaacoub
  AZURE_REGION: eastus2
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install ruff
          ruff check src/

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: lower
        run: echo "image_name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ github.repository }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-agent:
    name: Deploy SRE Agent
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    outputs:
      containerAppFqdn: ${{ steps.deploy-app.outputs.containerAppFqdn }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Lowercase image name
        id: lower
        run: echo "image_name=${REPO,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Deploy Bicep template
        id: deploy-app
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: >
            agentName=${{ env.AGENT_NAME }}
            location=${{ env.AZURE_REGION }}
            containerImage=${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}:latest
            appInsightsConnectionString=${{ secrets.APP_INSIGHTS_CONNECTION_STRING }}

      - name: Verify agent deployment
        run: |
          echo "Verifying agent deployment..."
          az resource show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AGENT_NAME }} \
            --resource-type "Microsoft.App/containerApps" \
            --query "{name:name, provisioningState:properties.provisioningState}" \
            --output table

      - name: Provision SRE Agent connectors
        run: |
          API_BASE="https://management.azure.com/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.App/agents/${{ env.AGENT_NAME }}"
          API_VER="api-version=2025-05-01-preview"
          IDENTITY="/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourcegroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.ManagedIdentity/userAssignedIdentities/${{ env.AGENT_NAME }}-identity"

          create_connector() {
            local name=$1 type=$2 identity=$3
            local body="{\"name\":\"$name\",\"properties\":{\"dataConnectorType\":\"$type\""
            if [ -n "$identity" ]; then
              body="$body,\"identity\":\"$identity\""
            fi
            body="$body}}"

            existing=$(az rest --method get --url "$API_BASE/connectors/$name?$API_VER" --query "properties.provisioningState" -o tsv 2>/dev/null || echo "")
            if [ "$existing" = "Succeeded" ]; then
              echo "Connector '$name' already exists — skipping"
              return
            fi

            echo "Creating connector '$name' (type=$type)..."
            az rest --method put \
              --url "$API_BASE/connectors/$name?$API_VER" \
              --headers "Content-Type=application/json" \
              --body "$body" \
              --query "{name:name, type:properties.dataConnectorType, state:properties.provisioningState}" \
              -o table

            for i in $(seq 1 12); do
              sleep 10
              state=$(az rest --method get --url "$API_BASE/connectors/$name?$API_VER" --query "properties.provisioningState" -o tsv 2>/dev/null || echo "Unknown")
              echo "  $name: $state"
              if [ "$state" = "Succeeded" ] || [ "$state" = "Failed" ]; then break; fi
            done
          }

          create_connector "azuremonitor" "AzureMonitor" "$IDENTITY"
          create_connector "azureresourcegraph" "AzureResourceGraph" "$IDENTITY"
          create_connector "github" "GitHub" ""

          echo ""
          echo "Final connector state:"
          az rest --method get --url "$API_BASE/connectors?$API_VER" \
            --query "value[].{name:name, type:properties.dataConnectorType, state:properties.provisioningState}" \
            -o table

      - name: Discover agent endpoint
        id: agent-endpoint
        run: |
          ENDPOINT=$(az rest --method get \
            --url "https://management.azure.com/subscriptions/${{ env.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.AZURE_RESOURCE_GROUP }}/providers/Microsoft.App/agents/${{ env.AGENT_NAME }}?api-version=2025-05-01-preview" \
            --query "properties.agentEndpoint" -o tsv)
          if [ -z "$ENDPOINT" ]; then
            echo "::error::Failed to discover agent endpoint"
            exit 1
          fi
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "Agent endpoint: $ENDPOINT"

      - name: Provision scheduled tasks & incident response plans
        run: |
          chmod +x infra/provision-agent-api.sh
          bash infra/provision-agent-api.sh "${{ steps.agent-endpoint.outputs.endpoint }}"

  deploy-monitoring:
    name: Deploy Monitoring (Alerts & Metrics)
    needs: deploy-agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Monitor alert rules
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ env.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./infra/alerts.bicep
          parameters: >
            webhookUrl=https://${{ needs.deploy-agent.outputs.containerAppFqdn }}/api/alerts/webhook

      - name: Verify monitoring deployment
        run: |
          echo "Verifying alert rules..."
          az monitor metrics alert list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[].{name:name, severity:severity, enabled:enabled}" \
            --output table
          echo ""
          echo "Verifying action group..."
          az monitor action-group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AGENT_NAME }}-ag \
            --query "{name:name, enabled:enabled, webhooks:webhookReceivers[].serviceUri}" \
            --output json
